name: CI/CD Pipeline - Migrador BD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: write
  pages: write
  id-token: write
  security-events: write
  actions: read

jobs:
  static-analysis:
    name: Análisis Estático (Sonar, Semgrep, Snyk)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          

          
      - name: Semgrep Scan
        uses: returntocorp/semgrep-action@v1
        with:
          publishToken: ${{ secrets.SEMGREP_APP_TOKEN }}
          generateSarif: "1"
          
      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          


  testing:
    name: Pruebas Automatizadas (Unitarias, BDD, Mutación)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r proyecto-si783-2026-i-u1-migrador-de-bd-codigo-web/requirements.txt
          
      - name: Install Playwright browsers
        run: |
          playwright install chromium
          
      - name: Run Unit & Integration Tests (Coverage)
        run: |
          cd proyecto-si783-2026-i-u1-migrador-de-bd-codigo-web
          pytest tests/ --cov=. --cov-report=html:../reports/coverage --cov-report=xml:../reports/coverage.xml --html=../reports/pytest/index.html
          
      - name: Run BDD Tests (Behave)
        run: |
          cd proyecto-si783-2026-i-u1-migrador-de-bd-codigo-web
          pip install behave-html-formatter
          mkdir -p ../reports/bdd
          behave -f behave_html_formatter:HTMLFormatter -o ../reports/bdd/index.html || true
          
      - name: Run Mutation Tests (Mutmut)
        run: |
          cd proyecto-si783-2026-i-u1-migrador-de-bd-codigo-web
          export PYTHONPATH=$(pwd)
          mutmut run || true
          pip install junit2html
          mutmut junitxml > mutmut.xml || true
          mkdir -p ../reports/mutation
          if [ -s mutmut.xml ]; then
            junit2html mutmut.xml ../reports/mutation/index.html || echo "<html><body><h1>Error generando reporte de mutacion</h1></body></html>" > ../reports/mutation/index.html
          else
            echo "<html><body><h1>No se encontraron resultados de mutacion</h1></body></html>" > ../reports/mutation/index.html
          fi
          
      - name: Upload Reports Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: reports/

  deploy-pages:
    name: Publicar Reportes en GitHub Pages
    needs: testing
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Reports Artifacts
        uses: actions/download-artifact@v4
        with:
          name: test-reports
          path: public
          
      - name: Create index.html for Pages
        run: |
          echo "<html><body><h1>Reportes de Calidad - Migrador BD</h1><ul>" > public/index.html
          echo "<li><a href='coverage/index.html'>Reporte de Cobertura (Pytest)</a></li>" >> public/index.html
          echo "<li><a href='bdd/index.html'>Reporte de BDD (Behave)</a></li>" >> public/index.html
          echo "<li><a href='mutation/index.html'>Reporte de Mutación (Mutmut)</a></li>" >> public/index.html
          echo "<li><a href='pytest/index.html'>Reporte de Pruebas Unitarias</a></li>" >> public/index.html
          echo "</ul></body></html>" >> public/index.html
          
      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true
        
      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
