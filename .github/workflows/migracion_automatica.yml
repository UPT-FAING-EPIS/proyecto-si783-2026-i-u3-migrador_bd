name: Ejecutar Migración de BD

on:
  workflow_dispatch:
    inputs:
      archivo_origen:
        description: 'Archivo de origen (ej: test.sqlite, datos.sql, info.csv)'
        required: true
        default: 'test.sqlite'
      nombre_salida:
        description: 'Nombre para el archivo migrado (ej: mi_migracion)'
        required: true
        default: 'mi_migracion'
      tipo_destino:
        description: 'Formato de destino'
        required: true
        default: 'mysql'
        type: choice
        options:
          - mysql
          - postgres
          - sqlite
          - mongodb
          - redis
          - cassandra
          - elasticsearch

jobs:
  migrar:
    runs-on: ubuntu-latest
    env:
      PYTHONIOENCODING: utf-8
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Descargar el código del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install sqlalchemy==2.0.23 pandas==2.1.1 numpy==1.26.4 openpyxl==3.1.3

      - name: Ejecutar Script de Migración
        run: |
          echo "=== Archivos en el directorio ==="
          ls -lh
          echo ""
          echo "=== Ejecutando migracion ==="
          python -u .agents/skills/migrador-bd/scripts/cli_migrator.py \
            --source "${{ github.event.inputs.archivo_origen }}" \
            --dest "${{ github.event.inputs.nombre_salida }}" \
            --tipo-dest "${{ github.event.inputs.tipo_destino }}"
          echo ""
          echo "=== Estado despues de migrar ==="
          echo "Carpeta output/:"
          ls -lhR output/ 2>/dev/null || echo "(output/ no existe)"
          echo "Uploads internos:"
          ls -lh proyecto-si783-2026-i-u1-migrador-de-bd-codigo-web/uploads/ 2>/dev/null || echo "(uploads/ vacio)"

      - name: 📦 Descargar archivo migrado
        uses: actions/upload-artifact@v4
        with:
          name: archivo-migrado
          path: output/
          retention-days: 7
          if-no-files-found: error
