<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - MigradorBD</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilo.css') }}">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f7fb;
        }
        .barra-nav {
            font-family: 'Inter', sans-serif;
        }
        .contenedor-registro {
            max-width: 450px;
            margin: 60px auto;
            padding: 40px 35px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(36, 74, 124, 0.08);
            border: 1px solid rgba(36, 74, 124, 0.08);
        }
        .contenedor-registro h1 {
            text-align: center;
            margin-bottom: 25px;
            color: #244a7c;
            font-weight: 700;
            font-size: 28px;
        }
        .grupo-form {
            margin-bottom: 20px;
        }
        .grupo-form label {
            display: block;
            margin-bottom: 8px;
            font-weight: 550;
            color: #4a5568;
            font-size: 14px;
        }
        .grupo-form input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
            transition: all 0.2s ease-in-out;
            font-family: inherit;
        }
        .grupo-form input:focus {
            outline: none;
            border-color: #244a7c;
            box-shadow: 0 0 0 3px rgba(36, 74, 124, 0.15);
        }
        .grupo-form small {
            display: block;
            margin-top: 5px;
            color: #94a3b8;
            font-size: 12px;
        }
        .boton-registro {
            width: 100%;
            padding: 12px;
            background-color: #244a7c;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            font-family: inherit;
        }
        .boton-registro:hover {
            background-color: #1d3d66;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(36, 74, 124, 0.2);
        }
        .boton-registro:active {
            transform: translateY(0);
        }
        .enlace-login {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #64748b;
        }
        .enlace-login a {
            color: #244a7c;
            text-decoration: none;
            font-weight: 600;
        }
        .enlace-login a:hover {
            text-decoration: underline;
            color: #1d3d66;
        }
        .mensaje-error {
            color: #b91c1c;
            background-color: #fef2f2;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid rgba(185, 28, 28, 0.1);
            font-size: 14px;
            font-weight: 500;
        }
        .separador {
            text-align: center;
            margin: 25px 0;
            position: relative;
        }
        .separador::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background-color: #e2e8f0;
        }
        .separador span {
            background: white;
            padding: 0 12px;
            position: relative;
            color: #64748b;
            font-size: 13px;
            font-weight: 500;
        }
        .botones-oauth {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .boton-oauth {
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            color: #334155;
            background: white;
        }
        .boton-oauth:hover {
            box-shadow: 0 4px 10px rgba(0,0,0,0.06);
            transform: translateY(-1px);
            border-color: #cbd5e1;
        }
        .boton-oauth:active {
            transform: translateY(0);
        }
        .boton-google {
            border-color: rgba(219, 68, 55, 0.2);
            color: #DB4437;
        }
        .boton-google:hover {
            background-color: #fef2f2;
            border-color: #DB4437;
        }
        .boton-github {
            border-color: rgba(51, 51, 51, 0.2);
            color: #1e293b;
        }
        .boton-github:hover {
            background-color: #f8fafc;
            border-color: #1e293b;
        }
        .nota-oauth {
            font-size: 12px;
            color: #94a3b8;
            text-align: center;
            margin-top: 15px;
            line-height: 1.4;
        }
        @media (max-width: 480px) {
            .contenedor-registro {
                margin: 30px 15px;
                padding: 30px 20px;
            }
            .botones-oauth {
                grid-template-columns: 1fr;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <nav class="barra-nav">
        <div class="contenedor-nav">
            <a href="/" class="logo">MigradorBD</a>
        </div>
    </nav>

    <div class="contenedor-registro">
        <h1>Crear Cuenta</h1>

        {% if error %}
        <div class="mensaje-error">{{ error }}</div>
        {% endif %}

        <!-- OAuth Buttons -->
        <div class="botones-oauth">
            <a href="{{ url_for('principal.oauth_login', proveedor='google', action='registro') }}" class="boton-oauth boton-google">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12.48 10.92v3.28h7.84c-.24 1.84-.853 3.187-1.787 4.133-1.147 1.147-2.933 2.4-6.053 2.4-4.827 0-8.6-3.893-8.6-8.72s3.773-8.72 8.6-8.72c2.6 0 4.507 1.027 5.907 2.347l2.307-2.307C18.747 1.44 16.133 0 12.48 0 5.867 0 .307 5.387.307 12s5.56 12 12.173 12c3.573 0 6.267-1.173 8.373-3.36 2.16-2.16 2.84-5.213 2.84-7.667 0-.76-.053-1.467-.173-2.053H12.48z"/>
                </svg>
                Google
            </a>
            <a href="{{ url_for('principal.oauth_login', proveedor='github', action='registro') }}" class="boton-oauth boton-github">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                </svg>
                GitHub
            </a>
        </div>

        <div class="separador">
            <span>O regístrate con tu email</span>
        </div>

        <form method="POST" action="{{ url_for('principal.registro') }}">
            <div class="grupo-form">
                <label for="usuario">Usuario:</label>
                <input type="text" id="usuario" name="usuario" required minlength="3">
                <small>Mínimo 3 caracteres</small>
            </div>

            <div class="grupo-form">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="grupo-form">
                <label for="contraseña">Contraseña:</label>
                <input type="password" id="contraseña" name="contraseña" required minlength="6">
                <small>Mínimo 6 caracteres</small>
            </div>

            <div class="grupo-form">
                <label for="confirmar">Confirmar Contraseña:</label>
                <input type="password" id="confirmar" name="confirmar" required minlength="6">
            </div>

            <button type="submit" class="boton-registro">Registrarse</button>
        </form>

        <div class="enlace-login">
            ¿Ya tienes cuenta? <a href="{{ url_for('principal.login') }}">Inicia sesión aquí</a>
        </div>

        <div class="nota-oauth">
            Al registrarte con Google o GitHub, se creará tu cuenta vinculada directamente.
        </div>
    </div>

    <script>
        document.querySelector('form').addEventListener('submit', function(e) {
            const contraseña = document.getElementById('contraseña').value;
            const confirmar = document.getElementById('confirmar').value;

            if (contraseña !== confirmar) {
                e.preventDefault();
                alert('Las contraseñas no coinciden');
            }
        });
    </script>
</body>
</html>
