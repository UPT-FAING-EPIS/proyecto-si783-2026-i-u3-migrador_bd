# Configuración de Nginx para Migrador BD
# Lugar: /etc/nginx/sites-available/migrador-bd
# Vincular: ln -s /etc/nginx/sites-available/migrador-bd /etc/nginx/sites-enabled/

upstream migrador_bd_app {
    # Apunta a Gunicorn ejecutándose en puerto 8000
    server 127.0.0.1:8000;
    keepalive 32;
}

# ============================================================
# VERSIÓN CON IP (SIN DOMINIO)
# ============================================================
# Descomenta esta sección si NO tienes dominio aún
# ============================================================

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    
    server_name _;
    
    # Tamaño máximo de upload
    client_max_body_size 500M;
    
    # Logs
    access_log /var/log/nginx/migrador-bd-access.log;
    error_log /var/log/nginx/migrador-bd-error.log;
    
    # Proxy a Gunicorn
    location / {
        proxy_pass http://migrador_bd_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
    }
    
    # WebSocket para Socket.IO
    location /socket.io {
        proxy_pass http://migrador_bd_app/socket.io;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

